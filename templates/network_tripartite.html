<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>

<script src="{{ vis_js_cdn }}"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #ffffff; font-family: sans-serif; overflow: hidden; }
  #network-container { width: 100vw; height: 100vh; }

  /* ── Floating label layer ── */
  #label-layer {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 10;
  }
  .node-label {
    position: absolute;
    transform: translateY(-50%);
    white-space: nowrap;
    font-family: sans-serif;
    font-size: 11px;
    color: #222;
    background: rgba(255,255,255,0.82);
    padding: 2px 7px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.06);
    pointer-events: none;
    transition: opacity 0.15s ease, color 0.15s ease;
    line-height: 1.4;
  }
  .node-label.dimmed {
    opacity: 0.18;
  }
  .node-label.muted {
    color: #aaa;
  }
  .node-label.highlighted {
    font-weight: bold;
    font-size: 12px;
    color: #000;
    opacity: 1;
    background: rgba(255,255,255,0.96);
    border-color: rgba(0,0,0,0.12);
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  /* ── Column headers ── */
  .col-header {
    position: fixed; top: 12px;
    background: rgba(255,255,255,0.92);
    border: 1px solid #ddd; border-radius: 6px;
    padding: 4px 14px; font-size: 12px; font-weight: bold;
    color: #333; z-index: 998; letter-spacing: 0.03em;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    transform: translateX(-50%);
  }

  /* ── Legend ── */
  #legend {
    position: fixed; top: 20px; left: 20px;
    background: rgba(255,255,255,0.97);
    border: 1px solid #ddd; border-radius: 10px;
    padding: 14px 18px; font-size: 12px; color: #111;
    z-index: 999; line-height: 2; max-height: 90vh;
    overflow-y: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    min-width: 220px; max-width: 240px;
  }
  .section-divider {
    border-top: 1px solid #eee; margin: 10px 0 8px; padding-top: 8px;
  }
  .section-title {
    font-size: 11px; font-weight: bold; color: #555;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
  }
  .spark-row {
    display: flex; align-items: center; margin-bottom: 7px; gap: 6px;
  }
  .spark-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .spark-name {
    font-size: 10px; color: #333; flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px;
  }
  .spark-line-wrap {
    flex: 1; height: 6px; background: #f0f0f0;
    border-radius: 3px; overflow: hidden; min-width: 40px;
  }
  .spark-line-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, #90CAF9, #1565C0);
  }
  .spark-count { font-size: 9px; color: #888; width: 18px; text-align: right; flex-shrink: 0; }

  /* ── Summary panel ── */
  #summary-panel {
    position: fixed; top: 20px; right: 20px;
    width: 270px; max-height: 85vh; overflow-y: auto;
    background: rgba(255,255,255,0.97);
    border: 1px solid #ddd; border-radius: 10px;
    padding: 16px 18px; font-size: 13px; color: #111;
    line-height: 1.75; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    display: none; z-index: 1000;
  }
  #summary-panel .s-title   { font-size: 15px; font-weight: bold; }
  #summary-panel .s-type    { font-size: 11px; color: #888; margin-bottom: 6px; display: block; }
  #summary-panel .s-degree  { font-size: 11px; color: #aaa; margin-bottom: 10px; display: block; }
  #summary-panel .s-section { font-weight: bold; margin-top: 10px; margin-bottom: 4px; font-size: 12px; }
  #summary-panel .s-item    { padding-left: 10px; font-size: 12px; }
  #summary-panel .s-sub     { padding-left: 10px; font-size: 11px; color: #999; }
  #summary-panel .s-hint    { font-size: 11px; color: #aaa; margin-top: 10px; }
  #summary-panel .s-pin     { font-size: 10px; color: #aaa; margin-top: 12px;
                               border-top: 1px solid #eee; padding-top: 8px; }
</style>
</head>
<body>

<div id="network-container"></div>
<div id="label-layer"></div>

<!-- Column headers — positioned dynamically by JS -->
<div id="col-field"    class="col-header">Science Fields</div>
<div id="col-staff"    class="col-header">Staff</div>
<div id="col-division" class="col-header">Divisions</div>

<!-- Legend -->
<div id="legend">
  <b style="font-size:13px;">{{ title }}</b><br><br>
  <b>Science Categories</b>
  {% for cat in categories %}
  <div>
    <span style="color:{{ category_colors[cat] }};font-size:15px;">●</span>
    <span style="font-size:11px;"> {{ cat }}</span>
  </div>
  {% endfor %}
  <br>
  <div>
    <span style="color:{{ staff_color }};font-size:15px;">●</span>
    <span style="font-size:11px;"> Staff</span>
  </div>
  <div>
    <span style="color:{{ division_color }};font-size:15px;">●</span>
    <span style="font-size:11px;"> Division</span>
  </div>
  <br>
  <span style="color:#888;font-size:10px;">
    Hover to highlight · Click to pin
  </span>
  <div id="spark-fields"    class="section-divider"></div>
  <div id="spark-staff"     class="section-divider"></div>
  <div id="spark-divisions" class="section-divider"></div>
</div>

<!-- Summary Panel -->
<div id="summary-panel"></div>

<script>
function initNetwork() {

// ── Data injected by Python ─────────────────────────────────────────────
var nodesData   = {{ nodes_json }};
var edgesData   = {{ edges_json }};
var adjacency   = {{ adjacency_json }};
var nodeMeta    = {{ node_meta_json }};
var divisionIds = {{ divisions_json }};
var GLOW        = "{{ glow_color }}";
var DIM         = "{{ dim_color }}";
var DOT_SIZE    = {{ dot_size }};
var X_FIELD     = {{ x_field }};
var X_STAFF     = {{ x_staff }};
var X_DIVISION  = {{ x_division }};

// ── State ─────────────────────────────────────────────────────────────────
var activeNode  = null;
var activeEdge  = null;
var hoveredNode = null;

// ── Degree computation ────────────────────────────────────────────────────
var nodeDegree = {};
nodesData.forEach(function(n) { nodeDegree[n.id] = 0; });
Object.keys(adjacency).forEach(function(id) {
    nodeDegree[id] = (adjacency[id] || []).length;
});

var staffScienceDeg  = {};
var staffDivisionDeg = {};
nodesData.filter(function(n) { return n.group === "staff"; }).forEach(function(n) {
    var nbrs = adjacency[n.id] || [];
    staffScienceDeg[n.id]  = nbrs.filter(function(x) { return nodeMeta[x] && nodeMeta[x].type === "field";    }).length;
    staffDivisionDeg[n.id] = nbrs.filter(function(x) { return nodeMeta[x] && nodeMeta[x].type === "division"; }).length;
});

var fieldNodes    = nodesData.filter(function(n) { return n.group === "field";    });
var staffNodes    = nodesData.filter(function(n) { return n.group === "staff";    });
var divisionNodes = nodesData.filter(function(n) { return n.group === "division"; });

function rankByDegree(nodes) {
    var sorted = nodes.slice().sort(function(a,b) { return (nodeDegree[b.id]||0)-(nodeDegree[a.id]||0); });
    var ranks  = {};
    sorted.forEach(function(n, i) { ranks[n.id] = i; });
    return ranks;
}
var fieldRank    = rankByDegree(fieldNodes);
var staffRank    = rankByDegree(staffNodes);
var divisionRank = rankByDegree(divisionNodes);

function groupMaxDeg(nodes) {
    return Math.max.apply(null, nodes.map(function(n) { return nodeDegree[n.id] || 1; }));
}
var maxFieldDeg    = groupMaxDeg(fieldNodes);
var maxStaffDeg    = groupMaxDeg(staffNodes);
var maxDivisionDeg = groupMaxDeg(divisionNodes);

function nodeSize(id) {
    var meta = nodeMeta[id];
    if (!meta) return DOT_SIZE;
    var deg, mx;
    if (meta.type === "field")    { deg = nodeDegree[id]||1; mx = maxFieldDeg;    }
    if (meta.type === "staff")    { deg = nodeDegree[id]||1; mx = maxStaffDeg;    }
    if (meta.type === "division") { deg = nodeDegree[id]||1; mx = maxDivisionDeg; }
    return DOT_SIZE + (DOT_SIZE * 1.5) * (deg / mx);
}

// ── vis.js init ───────────────────────────────────────────────────────────
var container = document.getElementById("network-container");
var visNodes  = new vis.DataSet(nodesData);
var visEdges  = new vis.DataSet(edgesData);
var network   = new vis.Network(
    container,
    { nodes: visNodes, edges: visEdges },
    {
        physics:     { enabled: false },
        interaction: { hover: true, tooltips: false },
        nodes:       { borderWidth: 0, shadow: false },
        edges:       { smooth: { type: "curvedCW", roundness: 0.1 } },
    }
);

// Apply degree-based sizes, no labels in vis.js
visNodes.update(nodesData.map(function(n) {
    return { id: n.id, label: "", size: nodeSize(n.id) };
}));

network.once("afterDrawing", function() {
    network.fit({ animation: { duration: 600, easingFunction: "easeInOutQuad" } });
    buildLabelLayer();
    positionLabels();
    positionColumnHeaders();
    buildSparkSections();
    restoreDefault();
    updateLabelStyles();   // ← add this line
});

network.on("afterDrawing", function() { positionLabels(); });
network.on("zoom",         function() { positionColumnHeaders(); updateLabelStyles(); });
network.on("dragEnd",      function() { positionColumnHeaders(); });

// ── HTML label layer ──────────────────────────────────────────────────────
var labelLayer = document.getElementById("label-layer");
var labelEls   = {};

function buildLabelLayer() {
    labelLayer.innerHTML = "";
    labelEls = {};
    nodesData.forEach(function(n) {
        var el            = document.createElement("div");
        el.className      = "node-label";
        el.textContent    = n.id;
        el.dataset.nodeId = n.id;
        labelLayer.appendChild(el);
        labelEls[n.id] = el;
    });
}

function positionLabels() {
    if (!labelEls || Object.keys(labelEls).length === 0) return;
    var positions = network.getPositions();
    nodesData.forEach(function(n) {
        var el = labelEls[n.id];
        if (!el || !positions[n.id]) return;
        var pos   = network.canvasToDOM(positions[n.id]);
        var sz    = nodeSize(n.id);
        var scale = network.getScale();
        var gap   = (sz * scale) + 6;
        var meta  = nodeMeta[n.id];
        if (meta && meta.type === "field") {
            // Left of dot — text right-edge near dot
            el.style.left      = (pos.x - gap) + "px";
            el.style.top       = pos.y + "px";
            el.style.transform = "translateY(-50%) translateX(-100%)";
        } else {
            // Staff + Division — right of dot
            el.style.left      = (pos.x + gap) + "px";
            el.style.top       = pos.y + "px";
            el.style.transform = "translateY(-50%)";
        }
    });
}

// ── Label style helpers ───────────────────────────────────────────────────
function updateLabelStyles() {
    if (activeNode || activeEdge || hoveredNode) return;
    var scale = network.getScale ? network.getScale() : 1;
    applyDefaultLabelStyles(scale);
}

function applyDefaultLabelStyles(scale) {
    nodesData.forEach(function(n) {
        var el = labelEls[n.id];
        if (!el) return;
        var meta = nodeMeta[n.id];
        var rank = 0;
        if (meta && meta.type === "field")    rank = fieldRank[n.id]    || 0;
        if (meta && meta.type === "staff")    rank = staffRank[n.id]    || 0;
        if (meta && meta.type === "division") rank = divisionRank[n.id] || 0;

        el.classList.remove("dimmed", "muted", "highlighted");

        if (meta && meta.type === "staff") {
            // Hide staff labels at low zoom, show top-ranked at mid zoom
            if      (scale < 0.2)  { el.classList.add("dimmed"); }
            else if (scale < 0.4)  { if (rank >= 5)  el.classList.add("dimmed"); }
            else if (scale < 0.6)  { if (rank >= 10) el.classList.add("muted");  }
        } else if (scale < 0.25 && rank >= 8) {
            // Existing muted logic for fields/divisions at extreme zoom-out
            el.classList.add("muted");
        }
    });
}

function highlightLabels(highlightSet) {
    nodesData.forEach(function(n) {
        var el = labelEls[n.id];
        if (!el) return;
        el.classList.remove("dimmed", "muted", "highlighted");
        if (highlightSet.has(n.id)) {
            el.classList.add("highlighted");
        } else {
            el.classList.add("dimmed");
        }
    });
}

function restoreLabelStyles() {
    var scale = network.getScale ? network.getScale() : 1;
    applyDefaultLabelStyles(scale);
}

// ── Column header positioning ─────────────────────────────────────────────
function positionColumnHeaders() {
    var xF = network.canvasToDOM({ x: X_FIELD,    y: 0 }).x;
    var xS = network.canvasToDOM({ x: X_STAFF,    y: 0 }).x;
    var xD = network.canvasToDOM({ x: X_DIVISION, y: 0 }).x;
    document.getElementById("col-field").style.left    = xF + "px";
    document.getElementById("col-staff").style.left    = xS + "px";
    document.getElementById("col-division").style.left = xD + "px";
}

// ── Spark chart builder ───────────────────────────────────────────────────
function sparkRow(id, color, deg, maxDeg) {
    var pct   = maxDeg > 0 ? (deg / maxDeg * 100) : 0;
    var short = id.length > 20 ? id.substring(0, 19) + "…" : id;
    return '<div class="spark-row">' +
        '<div class="spark-dot" style="background:' + color + ';"></div>' +
        '<span class="spark-name" title="' + id + '">' + short + '</span>' +
        '<div class="spark-line-wrap"><div class="spark-line-fill" style="width:' + pct + '%;"></div></div>' +
        '<span class="spark-count">' + deg + '</span>' +
    '</div>';
}

function buildSparkSections() {
    // Top 5 Science Fields
    var topF  = fieldNodes.slice().sort(function(a,b) { return (nodeDegree[b.id]||0)-(nodeDegree[a.id]||0); }).slice(0,5);
    var maxF  = nodeDegree[topF[0].id] || 1;
    var fHtml = '<div class="section-title">Top 5 Science Fields</div>';
    topF.forEach(function(n) { fHtml += sparkRow(n.id, nodeMeta[n.id].color, nodeDegree[n.id]||0, maxF); });
    document.getElementById("spark-fields").innerHTML = fHtml;

    // Top 5 Divisions
    var topD  = divisionNodes.slice().sort(function(a,b) { return (nodeDegree[b.id]||0)-(nodeDegree[a.id]||0); }).slice(0,5);
    var maxD  = nodeDegree[topD[0].id] || 1;
    var dHtml = '<div class="section-title">Top 5 Divisions</div>';
    topD.forEach(function(n) { dHtml += sparkRow(n.id, "{{ division_color }}", nodeDegree[n.id]||0, maxD); });
    document.getElementById("spark-divisions").innerHTML = dHtml;

    // Top 5 Staff by science / by division
    var topSS  = staffNodes.slice().sort(function(a,b) { return (staffScienceDeg[b.id]||0)-(staffScienceDeg[a.id]||0); }).slice(0,5);
    var maxSS  = staffScienceDeg[topSS[0].id] || 1;
    var topSD  = staffNodes.slice().sort(function(a,b) { return (staffDivisionDeg[b.id]||0)-(staffDivisionDeg[a.id]||0); }).slice(0,5);
    var maxSD  = staffDivisionDeg[topSD[0].id] || 1;
    var sHtml  = '<div class="section-title">Top 5 Staff — by Science Fields</div>';
    topSS.forEach(function(n) { sHtml += sparkRow(n.id, "{{ staff_color }}", staffScienceDeg[n.id]||0, maxSS); });
    sHtml += '<div style="margin-top:10px;" class="section-title">Top 5 Staff — by Divisions</div>';
    topSD.forEach(function(n) { sHtml += sparkRow(n.id, "{{ staff_color }}", staffDivisionDeg[n.id]||0, maxSD); });
    document.getElementById("spark-staff").innerHTML = sHtml;
}

// ── Summary panel helpers ─────────────────────────────────────────────────
var panel = document.getElementById("summary-panel");

function typeLabel(id) {
    var m = nodeMeta[id];
    if (!m) return "";
    if (m.type === "field")    return "Science Field — " + m.category;
    if (m.type === "staff")    return "Staff";
    if (m.type === "division") return "Division";
    return "";
}

function buildSummary(nodeId, pinned) {
    var neighbors = adjacency[nodeId] || [];
    var meta      = nodeMeta[nodeId]  || {};
    var fields    = neighbors.filter(function(n) { return nodeMeta[n] && nodeMeta[n].type === "field";    });
    var staffList = neighbors.filter(function(n) { return nodeMeta[n] && nodeMeta[n].type === "staff";    });
    var divList   = neighbors.filter(function(n) { return nodeMeta[n] && nodeMeta[n].type === "division"; });

    var html  = '<div class="s-title">'   + nodeId + '</div>';
    html     += '<span class="s-type">'   + typeLabel(nodeId) + '</span>';
    html     += '<span class="s-degree">' + (nodeDegree[nodeId]||0) + ' total connections</span>';

    if (meta.type === "staff") {
        html += '<div class="s-section">Science Fields (' + fields.length + ')</div>';
        fields.forEach(function(f) {
            html += '<div class="s-item">● ' + f + '</div>';
            html += '<div class="s-sub">' + (nodeMeta[f] ? nodeMeta[f].category : "") + '</div>';
        });
        html += '<div class="s-section">Divisions (' + divList.length + ')</div>';
        divList.forEach(function(d) { html += '<div class="s-item">● ' + d + '</div>'; });
    } else if (meta.type === "field") {
        html += '<div class="s-section">Connected Staff (' + staffList.length + ')</div>';
        staffList.forEach(function(s) { html += '<div class="s-item">● ' + s + '</div>'; });
        html += '<div class="s-hint">Hover a staff node to see their divisions</div>';
    } else if (meta.type === "division") {
        html += '<div class="s-section">Connected Staff (' + staffList.length + ')</div>';
        staffList.forEach(function(s) { html += '<div class="s-item">● ' + s + '</div>'; });
        html += '<div class="s-hint">Hover a staff node to see their science fields</div>';
    }
    if (pinned) html += '<div class="s-pin">📌 Pinned — click node or canvas to unpin</div>';
    return html;
}

function buildEdgeSummary(edgeId, pinned) {
    var edge         = visEdges.get(edgeId);
    if (!edge) return "";
    var fromMeta     = nodeMeta[edge.from] || {};
    var toMeta       = nodeMeta[edge.to]   || {};
    var fieldNode    = fromMeta.type === "field"    ? edge.from : (toMeta.type === "field"    ? edge.to : null);
    var staffNode    = fromMeta.type === "staff"    ? edge.from : (toMeta.type === "staff"    ? edge.to : null);
    var divisionNode = fromMeta.type === "division" ? edge.from : (toMeta.type === "division" ? edge.to : null);
    var html = "";

    if (fieldNode && staffNode) {
        var fieldCat = nodeMeta[fieldNode] ? nodeMeta[fieldNode].category : "";
        html += '<div class="s-title">' + fieldNode + '</div>';
        html += '<span class="s-type">Science Field — ' + fieldCat + '</span>';
        html += '<div class="s-section">↔ Connected Staff</div>';
        html += '<div class="s-item">● ' + staffNode + '</div>';
        var staffDivs = (adjacency[staffNode]||[]).filter(function(n) { return nodeMeta[n] && nodeMeta[n].type === "division"; });
        if (staffDivs.length > 0) {
            html += '<div class="s-section">Divisions reached via ' + staffNode.split(",")[0] + '</div>';
            staffDivs.forEach(function(d) { html += '<div class="s-item">● ' + d + '</div>'; });
        }
        var otherStaff = (adjacency[fieldNode]||[]).filter(function(n) { return nodeMeta[n] && nodeMeta[n].type === "staff" && n !== staffNode; });
        if (otherStaff.length > 0) {
            html += '<div class="s-section">Other staff on this field (' + otherStaff.length + ')</div>';
            otherStaff.forEach(function(s) { html += '<div class="s-item">● ' + s + '</div>'; });
        }
    } else if (staffNode && divisionNode) {
        html += '<div class="s-title">' + staffNode + '</div>';
        html += '<span class="s-type">Staff → ' + divisionNode + '</span>';
        var staffFields = (adjacency[staffNode]||[]).filter(function(n) { return nodeMeta[n] && nodeMeta[n].type === "field"; });
        if (staffFields.length > 0) {
            html += '<div class="s-section">Science fields brought to ' + divisionNode + '</div>';
            staffFields.forEach(function(f) {
                html += '<div class="s-item">● ' + f + '</div>';
                html += '<div class="s-sub">' + (nodeMeta[f] ? nodeMeta[f].category : "") + '</div>';
            });
        }
        var otherStaff = (adjacency[divisionNode]||[]).filter(function(n) { return nodeMeta[n] && nodeMeta[n].type === "staff" && n !== staffNode; });
        if (otherStaff.length > 0) {
            html += '<div class="s-section">Other staff in ' + divisionNode + ' (' + otherStaff.length + ')</div>';
            otherStaff.forEach(function(s) { html += '<div class="s-item">● ' + s + '</div>'; });
        }
    } else {
        html += '<div class="s-title">Connection</div>';
        html += '<div class="s-item">' + edge.from + ' ↔ ' + edge.to + '</div>';
    }
    if (pinned) html += '<div class="s-pin">📌 Pinned — click edge or canvas to unpin</div>';
    return html;
}

// ── Apply / restore highlight ─────────────────────────────────────────────
function applyHighlight(nodeId, pinned) {
    var neighbors = new Set(adjacency[nodeId] || []);
    var highlight = new Set([nodeId, ...neighbors]);

    visNodes.update(visNodes.get().map(function(n) {
        var isHovered = n.id === nodeId;
        var isHighlit = highlight.has(n.id);
        var orig      = nodeMeta[n.id] ? nodeMeta[n.id].color : "#cccccc";
        var sz        = nodeSize(n.id);
        if (isHighlit) {
            return { id: n.id, label: "",
                color:       { background: orig, border: isHovered ? "#222222" : GLOW },
                borderWidth: isHovered ? 3 : 2,
                size:        sz + 8,
                shadow:      isHovered ? false : { enabled: true, color: "rgba(255,215,0,0.65)", size: 16, x:0, y:0 } };
        } else {
            return { id: n.id, label: "",
                color: { background: DIM, border: DIM },
                borderWidth: 0, size: sz, shadow: false };
        }
    }));

    visEdges.update(visEdges.get().map(function(e) {
        if (highlight.has(e.from) && highlight.has(e.to)) {
            return { id: e.id, color: { color: "#111111" }, width: 3.5,
                     shadow: { enabled: true, color: "rgba(255,215,0,0.3)", size: 8, x:0, y:0 } };
        } else {
            return { id: e.id, color: { color: "rgba(210,210,210,0.15)" }, width: 0.5, shadow: false };
        }
    }));

    highlightLabels(highlight);
    panel.innerHTML     = buildSummary(nodeId, pinned);
    panel.style.display = "block";
}

function restoreDefault() {
    visNodes.update(visNodes.get().map(function(n) {
        var orig = nodeMeta[n.id] ? nodeMeta[n.id].color : "#cccccc";
        return { id: n.id, label: "", color: { background: orig, border: orig },
                 borderWidth: 0, size: nodeSize(n.id), shadow: false };
    }));
    visEdges.update(visEdges.get().map(function(e) {
        return { id: e.id, color: { color: "rgba(180,180,180,0.4)" }, width: 1.2, shadow: false };
    }));
    restoreLabelStyles();
    panel.style.display = "none";
    activeNode = null;
    activeEdge = null;
}

// ── Event handlers ─────────────────────────────────────────────────────────
network.on("hoverNode", function(params) {
    hoveredNode = params.node;
    if (!activeNode && !activeEdge) applyHighlight(params.node, false);
});

network.on("blurNode", function() {
    hoveredNode = null;
    if (!activeNode && !activeEdge) restoreDefault();
});

network.on("click", function(params) {
    // Edge click
    if (params.edges.length > 0 && params.nodes.length === 0) {
        var clickedEdge = params.edges[0];
        if (activeEdge === clickedEdge) {
            activeEdge = null; activeNode = null; restoreDefault();
        } else {
            activeEdge = clickedEdge; activeNode = null;
            var edge      = visEdges.get(clickedEdge);
            var highlight = new Set([edge.from, edge.to]);

            visNodes.update(visNodes.get().map(function(n) {
                var isHighlit = highlight.has(n.id);
                var orig      = nodeMeta[n.id] ? nodeMeta[n.id].color : "#cccccc";
                var sz        = nodeSize(n.id);
                if (isHighlit) {
                    return { id: n.id, label: "", color: { background: orig, border: GLOW },
                             borderWidth: 2, size: sz + 8,
                             shadow: { enabled: true, color: "rgba(255,215,0,0.65)", size: 16, x:0, y:0 } };
                } else {
                    return { id: n.id, label: "", color: { background: DIM, border: DIM },
                             borderWidth: 0, size: sz, shadow: false };
                }
            }));

            visEdges.update(visEdges.get().map(function(e) {
                if (e.id === clickedEdge) {
                    return { id: e.id, color: { color: "#111111" }, width: 4,
                             shadow: { enabled: true, color: "rgba(255,215,0,0.5)", size: 10, x:0, y:0 } };
                } else {
                    return { id: e.id, color: { color: "rgba(210,210,210,0.15)" }, width: 0.5, shadow: false };
                }
            }));

            highlightLabels(highlight);
            panel.innerHTML     = buildEdgeSummary(clickedEdge, true);
            panel.style.display = "block";
        }
        return;
    }

    // Node click
    if (params.nodes.length > 0) {
        var clicked = params.nodes[0];
        activeEdge = null;
        if (activeNode === clicked) { activeNode = null; restoreDefault(); }
        else                        { activeNode = clicked; applyHighlight(clicked, true); }
    } else {
        if (activeNode || activeEdge) { activeNode = null; activeEdge = null; restoreDefault(); }
    }
});

} // end initNetwork
</script>
