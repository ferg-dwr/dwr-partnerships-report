name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]        # Runs on PRs targeting main (i.e. develop → main)

jobs:
  lint-and-test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Ruff — check formatting
        run: ruff format --check dwr_report/ tests/

      - name: Ruff — lint
        run: ruff check dwr_report/ tests/

      - name: Mypy — type check
        run: mypy dwr_report/

      - name: Pytest — run tests with coverage
        run: pytest